<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guia de Leitura — Inferno (Dante Alighieri)</title>

    <!-- Font Awesome (ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1410;
            background-image: radial-gradient(circle at 20% 20%, #2f241c 0%, #0f0b08 100%);
            color: #ece3d9;
            font-family: 'Cormorant Garamond', serif;
            line-height: 1.7;
            padding: 1.5rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(20, 16, 12, 0.85);
            backdrop-filter: blur(2px);
            border: 1px solid #5b4a3a;
            border-radius: 2rem;
            padding: 2rem 2rem 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
        }

        header {
            text-align: center;
            border-bottom: 2px solid #8a7a6b;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        header h1 {
            font-family: 'MedievalSharp', cursive;
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #e6d5c0;
            text-shadow: 0 0 15px rgba(200, 160, 120, 0.2);
        }

        header h1 i {
            color: #b8956e;
            margin: 0 0.5rem;
        }

        header p {
            font-size: 1.2rem;
            color: #bcab9a;
            margin-top: 0.5rem;
            font-style: italic;
        }

        header .sub {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
            font-size: 0.95rem;
            color: #8e7d6b;
        }

        header .sub span {
            background: #2c221c;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            border: 1px solid #5b4a3a;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem 2rem;
            background: #241d17;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            margin-bottom: 2rem;
            border: 1px solid #4c3d30;
        }

        .stats .stat-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 1rem;
            color: #cfc0b0;
        }

        .stats .stat-item i {
            color: #b8956e;
            width: 1.4rem;
            text-align: center;
        }

        .stats .stat-item strong {
            color: #eedcc8;
            font-weight: 600;
        }

        .filtros {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .filtros .btn-filtro {
            background: #2c221c;
            border: 1px solid #4d3d2f;
            color: #cfc0b0;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.03em;
        }

        .filtros .btn-filtro:hover {
            background: #4d3d2f;
            color: #f5eadc;
            border-color: #b8956e;
        }

        .filtros .btn-filtro.ativo {
            background: #6b5542;
            border-color: #dbb594;
            color: #fff6ea;
            box-shadow: 0 0 12px rgba(200, 160, 120, 0.2);
        }

        .lista-cantos {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .card-canto {
            background: #1f1814;
            border-left: 6px solid #6b5542;
            border-radius: 1.2rem;
            padding: 1.4rem 2rem 1.8rem;
            transition: 0.25s;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
        }

        .card-canto:hover {
            background: #261e18;
            border-left-color: #b8956e;
            transform: translateY(-2px);
        }

        .card-canto .cabecalho-canto {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.5rem 1.2rem;
            margin-bottom: 0.5rem;
        }

        .card-canto .cabecalho-canto .num {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.6rem;
            color: #b8956e;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .card-canto .cabecalho-canto .titulo {
            font-size: 1.8rem;
            font-weight: 600;
            color: #f0dfcd;
            letter-spacing: 0.02em;
        }

        .card-canto .cabecalho-canto .circulo-tag {
            font-size: 0.85rem;
            background: #2c221c;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            color: #d4c3b0;
            border: 1px solid #5b4a3a;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .card-canto .circulo-tag .cor-bolinha {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid #3f3329;
        }

        .card-canto .resumo {
            font-size: 1.1rem;
            color: #d7cbbc;
            margin: 0.6rem 0 1rem;
            padding-left: 0.2rem;
            border-left: 3px solid #4d3d2f;
            padding-left: 1rem;
        }

        .card-canto .versao-simples {
            background: #1d1612;
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            margin: 0.8rem 0 1rem;
            color: #cfbfae;
            border-left: 3px solid #7d6a57;
            font-style: italic;
        }

        .card-canto .versao-simples strong {
            color: #dbb594;
            font-style: normal;
        }

        .card-canto .detalhes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem 2rem;
            margin-top: 0.8rem;
        }

        .card-canto .detalhes .bloco {
            background: #14100c;
            border-radius: 12px;
            padding: 0.6rem 1rem;
            border: 1px solid #2f241c;
        }

        .card-canto .detalhes .bloco h4 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #b8956e;
            margin-bottom: 0.2rem;
            font-weight: 400;
        }

        .card-canto .detalhes .bloco p,
        .card-canto .detalhes .bloco li {
            font-size: 0.98rem;
            color: #d4c5b4;
        }

        .card-canto .detalhes .bloco ul {
            list-style: none;
            padding-left: 0;
        }

        .card-canto .detalhes .bloco ul li {
            padding: 0.15rem 0;
            border-bottom: 1px dotted #2f241c;
        }

        .card-canto .detalhes .bloco ul li strong {
            color: #eedcc8;
            font-weight: 600;
        }

        .card-canto .detalhes .bloco ul li:last-child {
            border-bottom: none;
        }

        .card-canto .contexto {
            margin-top: 0.8rem;
            font-size: 0.98rem;
            color: #b8a697;
            background: #1a1410;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            border-left: 3px solid #5b4a3a;
        }

        .card-canto .contexto strong {
            color: #d4c3b0;
        }

        .card-canto .personagens-destaque {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.8rem;
            margin: 0.4rem 0 0.2rem;
        }

        .card-canto .personagens-destaque .tag-personagem {
            background: #1d1612;
            border-radius: 30px;
            padding: 0.1rem 0.8rem;
            font-size: 0.85rem;
            border: 1px solid #3f3329;
            color: #d4c3b0;
        }

        .card-canto .personagens-destaque .tag-personagem i {
            color: #b8956e;
            margin-right: 0.3rem;
        }

        @media (max-width: 700px) {
            .container {
                padding: 1rem;
            }
            header h1 {
                font-size: 2.2rem;
            }
            .card-canto {
                padding: 1rem 1.2rem;
            }
            .card-canto .cabecalho-canto .titulo {
                font-size: 1.4rem;
            }
            .card-canto .detalhes {
                grid-template-columns: 1fr;
            }
            .stats {
                border-radius: 20px;
                padding: 0.6rem 1rem;
            }
            .filtros .btn-filtro {
                font-size: 0.85rem;
                padding: 0.3rem 0.8rem;
            }
        }

        @media (max-width: 450px) {
            header h1 {
                font-size: 1.8rem;
            }
            .card-canto .cabecalho-canto .num {
                font-size: 1.2rem;
            }
            .card-canto .resumo {
                font-size: 1rem;
            }
        }

        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: #6b5d4e;
            border-top: 1px solid #2f241c;
            padding-top: 1.5rem;
            letter-spacing: 0.05em;
        }

        footer i {
            color: #b8956e;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <header>
            <h1>
                <i class="fas fa-fire"></i>
                Inferno
                <i class="fas fa-skull"></i>
            </h1>
            <p>Divina Comédia — Guia de Leitura</p>
            <div class="sub">
                <span><i class="fas fa-feather-alt"></i> Dante Alighieri</span>
                <span><i class="fas fa-book-open"></i> 34 cantos</span>
                <span><i class="fas fa-circle"></i> 9 círculos</span>
            </div>
        </header>

        <div class="stats" id="stats">
            <div class="stat-item"><i class="fas fa-layer-group"></i> <strong id="totalCantos">34</strong> cantos</div>
            <div class="stat-item"><i class="fas fa-users"></i> <strong id="totalPersonagens">0</strong> personagens</div>
            <div class="stat-item"><i class="fas fa-quote-right"></i> <strong id="totalVocabulario">0</strong> termos</div>
        </div>

        <div class="filtros" id="filtros">
            <button class="btn-filtro ativo" data-filtro="todos">Todos os cantos</button>
            <button class="btn-filtro" data-filtro="personagens">Personagens</button>
            <button class="btn-filtro" data-filtro="vocabulario">Vocabulário</button>
            <button class="btn-filtro" data-filtro="contexto">Contexto</button>
            <button class="btn-filtro" data-filtro="simples">Versão simples</button>
        </div>

        <div class="lista-cantos" id="listaCantos"></div>

        <footer>
            <i class="fas fa-feather-alt"></i> “E dali saímos a rever as estrelas.” &nbsp;—&nbsp; <em>Inferno XXXIV</em>
        </footer>

    </div>

    <script>
        // ============================================================
        // DADOS COMPLETOS - TODOS OS 34 CANTOS
        // ============================================================

        const CIRCULOS = [
            { id: 0, nome: "Fora do Inferno", cor: "#8a9a7c", desc: "A selva escura e o encontro com Virgílio" },
            { id: 1, nome: "1º Círculo — Limbo", cor: "#c9b896", desc: "Os virtuosos não batizados" },
            { id: 2, nome: "2º Círculo — Luxúria", cor: "#b98a6b", desc: "Os arrastados pelo desejo" },
            { id: 3, nome: "3º Círculo — Gula", cor: "#a97a5a", desc: "Os afundados na lama e no granizo" },
            { id: 4, nome: "4º/5º Círculo — Avareza e Ira", cor: "#9a6a4c", desc: "Os que amaram o dinheiro e os que odiaram" },
            { id: 5, nome: "Muralhas de Dite", cor: "#8a5a40", desc: "A cidade de ferro dentro do Inferno" },
            { id: 6, nome: "6º Círculo — Heresia", cor: "#7a4c38", desc: "Túmulos em chamas" },
            { id: 7, nome: "7º Círculo — Violência", cor: "#6a3e30", desc: "Três anéis de sangue, floresta e fogo" },
            { id: 8, nome: "8º Círculo — Fraude (Malebolge)", cor: "#5a3228", desc: "Dez valas de engano" },
            { id: 9, nome: "9º Círculo — Traição", cor: "#2b2118", desc: "O gelo de Cocito e Lúcifer" },
        ];

        const CANTOS = [
            {
                numero: 1,
                titulo: "A Selva Escura",
                circulo: 0,
                resumo: "No meio da vida, Dante se perde numa floresta escura e tenta subir um monte iluminado pelo sol, mas três feras — uma onça, um leão e uma loba — bloqueiam seu caminho e o empurram de volta à escuridão. Desesperado, ele é resgatado pela sombra do poeta romano Virgílio, enviado para guiá-lo por um caminho diferente: atravessando o Inferno e o Purgatório antes de poder subir ao monte.",
                personagens: [
                    { nome: "Dante (o peregrino)", desc: "O narrador e protagonista, um homem de 35 anos perdido espiritualmente — representa qualquer pessoa em crise de fé ou de propósito." },
                    { nome: "Virgílio", desc: "Poeta romano (autor da Eneida), morto mil anos antes de Dante. Representa a razão humana e a sabedoria clássica, capaz de guiar até certo ponto." },
                    { nome: "A Onça (lonza)", desc: "Simboliza a luxúria/leviandade." },
                    { nome: "O Leão", desc: "Simboliza o orgulho e a violência." },
                    { nome: "A Loba", desc: "Simboliza a avareza — a mais perigosa das três, pois nunca se sacia." },
                ],
                vocabulario: [
                    { termo: "selva escura", significado: "Floresta densa e sem luz — metáfora para o pecado e a confusão espiritual, não um lugar físico real." },
                    { termo: "sombra (ombra)", significado: "Na Comédia, é como Dante chama as almas dos mortos — corpos espirituais que mantêm a aparência que tinham em vida." },
                    { termo: "colle", significado: "Monte/colina iluminado pelo sol — símbolo da felicidade e de Deus, que Dante tenta alcançar direto e não consegue." },
                    { termo: "vil (vilta)", significado: "Covardia — Dante usa a palavra ao se sentir fraco demais para a jornada." },
                ],
                contexto: "Dante escreveu isso por volta de 1308-1320, exilado de Florença após perder na disputa política entre guelfos brancos e negros. O 'meio do caminho' é uma referência à expectativa bíblica de vida de 70 anos (Salmo 90) — ou seja, Dante tem 35 anos, e a ação se passa na Semana Santa de 1300. Virgílio foi escolhido como guia porque, para os cristãos medievais, ele era visto quase como um profeta pagão: um verso seu na 4ª Écloga foi interpretado como uma previsão do nascimento de Cristo.",
                versaoSimples: "Dante estava perdido numa floresta escura — ele sabe que isso representa estar perdido na vida, longe de Deus. Ele vê uma montanha com sol e tenta subir direto, mas três animais assustadores não deixam. Ele fica com medo e quase desiste, até que aparece o fantasma de um poeta chamado Virgílio, que diz: 'Não dá pra subir direto. Eu vou te levar por outro caminho — vamos ter que descer antes de subir.'",
            },
            {
                numero: 2,
                titulo: "A Missão",
                circulo: 0,
                resumo: "À noite, Dante hesita: quem é ele para fazer uma jornada que só Eneias e São Paulo fizeram antes? Virgílio o acalma contando como foi enviado por Beatriz (o grande amor de Dante, já falecida), que por sua vez foi movida por Santa Lúcia, a pedido da Virgem Maria. Sabendo que três mulheres do Céu já estão cuidando dele, Dante recupera a coragem.",
                personagens: [
                    { nome: "Beatriz", desc: "Mulher amada por Dante em vida (morta jovem, em 1290). No poema, ela representa a graça divina e a teologia — quem vai guiar Dante depois de Virgílio, no Paraíso." },
                    { nome: "Santa Lúcia", desc: "Santa mártir, associada à luz e à visão — simboliza a graça iluminadora." },
                    { nome: "A Virgem Maria (chamada apenas de 'donna gentil')", desc: "Não é nomeada diretamente aqui, mas é quem inicia toda a corrente de socorro a Dante." },
                ],
                vocabulario: [
                    { termo: "Eneias", significado: "Herói troiano da Eneida de Virgílio, que visitou o mundo dos mortos ainda vivo — precedente clássico usado por Dante." },
                    { termo: "São Paulo", significado: "Apóstolo que, segundo a tradição, teve uma visão do paraíso ainda em vida (2 Coríntios 12) — precedente cristão." },
                    { termo: "três donne benedette", significado: "'As três mulheres bendizidas' — Maria, Lúcia e Beatriz, a corrente de intercessão celestial que salva Dante." },
                ],
                contexto: "Este canto estabelece uma ideia central da teologia católica medieval: a graça divina não age sozinha, ela desce em cadeia — de Deus/Maria, passando por santos, até tocar a pessoa comum. Também é aqui que fica claro que a razão (Virgílio) só leva Dante até certo ponto; depois será preciso a fé e o amor (Beatriz) para continuar.",
                versaoSimples: "Dante fica com medo: 'por que EU mereceria fazer essa viagem?'. Virgílio explica: você não está sozinho nisso — a mulher que você amou, Beatriz, que já está no Céu, pediu pra uma santa que pediu pra Nossa Senhora, e a notícia chegou até mim. Isso significa que pessoas boas estão torcendo por você lá em cima. Dante fica com mais coragem e decide seguir em frente.",
            },
            {
                numero: 3,
                titulo: "O Portão do Inferno",
                circulo: 0,
                resumo: "Dante lê a inscrição sobre o portão do Inferno, terminando com a frase mais famosa do poema: 'Deixai toda esperança, vós que entrais'. Do outro lado, encontram os indecisos — almas que em vida não escolheram nem o bem nem o mal, e por isso não são aceitas nem no Inferno nem no Céu. Chegam ao rio Aqueronte, onde o barqueiro Caronte transporta as almas condenadas.",
                personagens: [
                    { nome: "Os indecisos (ignavi)", desc: "Almas que 'viveram sem infâmia e sem louvor' — nunca tomaram partido. Correm eternamente atrás de uma bandeira sem sentido, perseguidos por vespas." },
                    { nome: "Caronte", desc: "Figura da mitologia grega/romana, barqueiro que cruza os mortos pelo rio Aqueronte até o Inferno." },
                ],
                vocabulario: [
                    { termo: "'Lasciate ogne speranza, voi ch'intrate'", significado: "'Deixai toda esperança, vós que entrais' — frase gravada no portão do Inferno, hoje uma das citações mais famosas da literatura ocidental." },
                    { termo: "Aqueronte", significado: "Na mitologia clássica, um dos rios do mundo dos mortos. Dante o reaproveita como a fronteira de entrada do Inferno cristão." },
                    { termo: "ignavi", significado: "Do italiano/latim, os 'covardes' ou indecisos — nem quentes nem frios, por isso rejeitados pelo Céu e pelo Inferno." },
                ],
                contexto: "É uma escolha teológica forte de Dante: ele inventa um grupo que não está em nenhuma categoria bíblica tradicional — os que nunca escolheram nada. A mensagem é clara: indiferença moral também tem consequência. Dante mistura livremente mitologia pagã (Caronte, Aqueronte) com cosmologia cristã, algo comum na cultura medieval, que via os clássicos greco-romanos como parte legítima do saber humano.",
                versaoSimples: "Na porta do Inferno tem uma placa que diz 'quem entra aqui perde toda esperança'. Do lado de dentro, primeiro tem gente que na vida nunca decidiu nada, nunca escolheu um lado — nem o bem, nem o mal — e por isso nem o Céu nem o Inferno os quiseram; ficam correndo sem destino, sendo picados por insetos. Depois Dante e Virgílio chegam a um rio, onde um barqueiro assustador chamado Caronte leva as almas condenadas para o outro lado.",
            },
            {
                numero: 4,
                titulo: "O Limbo",
                circulo: 1,
                resumo: "Dante acorda no primeiro círculo: o Limbo. Aqui não há tortura, apenas tristeza silenciosa — é onde ficam os que viveram bem, mas não conheceram Cristo (por terem nascido antes dele ou por nunca terem sido batizados), incluindo crianças. Dante encontra os grandes poetas da Antiguidade (Homero, Horácio, Ovídio, Lucano) e é convidado a se juntar a eles como o sexto grande poeta. Também vê filósofos como Aristóteles e Platão, e heróis como Eneias.",
                personagens: [
                    { nome: "Homero", desc: "Considerado o maior dos poetas, autor da Ilíada e Odisseia — recebe Dante como igual." },
                    { nome: "Aristóteles", desc: "Chamado por Dante de 'o mestre dos que sabem' — filósofo cuja obra foi a base da teologia medieval." },
                    { nome: "Sócrates e Platão", desc: "Filósofos gregos, junto de Aristóteles, representam o auge da razão humana sem revelação divina." },
                    { nome: "Saladino", desc: "Sultão muçulmano do século XII, elogiado por sua nobreza mesmo sem ser cristão." },
                ],
                vocabulario: [
                    { termo: "Limbo", significado: "Do latim 'limbus' (borda). Na teologia medieval (não é dogma oficial da Igreja), é a orla do Inferno reservada às almas boas que não puderam ser batizadas." },
                    { termo: "batismo", significado: "Sacramento cristão de entrada na fé — na visão de Dante, sua ausência é o que impede a salvação mesmo de pessoas virtuosas." },
                    { termo: "'bella scola'", significado: "'Bela escola' — como Dante chama o grupo de grandes poetas clássicos que o recebem." },
                ],
                contexto: "Este canto revela a tensão pessoal de Dante: como cristão, ele acredita que só a fé em Cristo salva; mas como homem de letras, ele amava profundamente a cultura greco-romana. O Limbo é sua solução poética — um lugar de respeito e tristeza, não de tormento, para os grandes nomes que vieram antes do cristianismo. É também onde Dante, com ousadia, se coloca ao lado de Homero e Virgílio como sexto grande poeta.",
                versaoSimples: "No primeiro andar do Inferno não tem sofrimento de dor — só uma tristeza calma. Aqui ficam pessoas boas que viveram antes de Jesus existir, ou que nunca tiveram a chance de ser batizadas, mesmo sendo gente honesta. Dante encontra os escritores mais famosos da história antiga, tipo Homero, e eles o recebem como amigo, como se ele também fosse um grande escritor.",
            },
            {
                numero: 5,
